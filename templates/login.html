<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FastAPI Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <main class="min-h-screen py-6 flex flex-col justify-center sm:py-12">
        <div class="relative py-3 sm:max-w-xl sm:mx-auto">
            <div class="relative px-4 py-10 bg-white shadow-lg sm:rounded-3xl sm:p-20">
                <div class="max-w-md mx-auto">
                    <h1 class="text-3xl font-bold mb-8 text-center text-gray-800">
                        Log In
                    </h1>

                    <div
                        id="errorAlert"
                        class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4"
                        role="alert"
                    >
                        <span id="errorMessage"></span>
                    </div>

                    <div
                        id="successAlert"
                        class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4"
                        role="alert"
                    >
                        <span id="successMessage"></span>
                    </div>

                    <form id="loginForm" class="space-y-6" novalidate>
                        <div>
                            <label
                                for="username"
                                class="block text-sm font-medium text-gray-700"
                            >
                                Username or Email
                            </label>

                            <input
                                type="text"
                                id="username"
                                name="username"
                                minlength="3"
                                maxlength="50"
                                required
                                autocomplete="username"
                                class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                            >
                        </div>

                        <div>
                            <label
                                for="password"
                                class="block text-sm font-medium text-gray-700"
                            >
                                Password
                            </label>

                            <input
                                type="password"
                                id="password"
                                name="password"
                                required
                                autocomplete="current-password"
                                class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
                            >
                        </div>

                        <button
                            id="loginButton"
                            type="submit"
                            class="w-full bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
                        >
                            Log In
                        </button>
                    </form>

                    <p class="mt-6 text-sm text-gray-600 text-center">
                        Do not have an account?
                        <a
                            href="/register"
                            class="font-medium text-indigo-600 hover:text-indigo-500"
                        >
                            Register
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("loginForm");
            const loginButton = document.getElementById("loginButton");
            const errorAlert = document.getElementById("errorAlert");
            const errorMessage = document.getElementById("errorMessage");
            const successAlert = document.getElementById("successAlert");
            const successMessage = document.getElementById("successMessage");

            function showError(message) {
                errorMessage.textContent = message;
                errorAlert.classList.remove("hidden");
                successAlert.classList.add("hidden");
            }

            function showSuccess(message) {
                successMessage.textContent = message;
                successAlert.classList.remove("hidden");
                errorAlert.classList.add("hidden");
            }

            function getErrorMessage(data) {
                if (typeof data.detail === "string") {
                    return data.detail;
                }

                if (Array.isArray(data.detail)) {
                    return data.detail
                        .map((error) => error.msg)
                        .join("; ");
                }

                if (typeof data.error === "string") {
                    return data.error;
                }

                return "Invalid username or password";
            }

            form.addEventListener("submit", async (event) => {
                event.preventDefault();

                errorAlert.classList.add("hidden");
                successAlert.classList.add("hidden");

                const username = form.username.value.trim();
                const password = form.password.value;

                if (username.length < 3) {
                    showError(
                        "Username or email must be at least 3 characters long"
                    );
                    return;
                }

                if (!password) {
                    showError("Password is required");
                    return;
                }

                loginButton.disabled = true;
                loginButton.textContent = "Logging in...";

                try {
                    const response = await fetch("/users/login", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            username: username,
                            password: password
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(getErrorMessage(data));
                    }

                    localStorage.setItem(
                        "access_token",
                        data.access_token
                    );

                    localStorage.setItem(
                        "token_type",
                        data.token_type || "bearer"
                    );

                    localStorage.setItem(
                        "user",
                        JSON.stringify(data.user)
                    );

                    showSuccess("Login successful! JWT token stored.");

                    form.reset();
                } catch (error) {
                    localStorage.removeItem("access_token");
                    localStorage.removeItem("token_type");
                    localStorage.removeItem("user");

                    showError(
                        error.message ||
                        "Invalid username or password"
                    );
                } finally {
                    loginButton.disabled = false;
                    loginButton.textContent = "Log In";
                }
            });
        });
    </script>
</body>
</html>
